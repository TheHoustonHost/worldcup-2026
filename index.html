<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-card: #1a1a1a;
            --bg-card-hover: #252525;
            --border: #2a2a2a;
            --border-hover: #3a3a3a;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a1;
            --text-tertiary: #6b6b6b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .app { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 48px; height: 48px; background: var(--gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .logo-text { font-size: 1.5rem; font-weight: 700; }
        .logo-text span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .stat-card.featured { background: var(--gradient); border: none; }
        .stat-value { font-size: 2rem; font-weight: 800; }
        .stat-card.featured .stat-value, .stat-card.featured .stat-label { color: white; }
        .stat-label { color: var(--text-secondary); font-size: 0.8rem; margin-top: 4px; }
        .countdown-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; text-align: center; margin-bottom: 30px; }
        .countdown-title { color: var(--text-secondary); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; }
        .countdown { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .countdown-item { background: #111; border-radius: 12px; padding: 15px 25px; min-width: 80px; }
        .countdown-value { font-size: 2.5rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
        .countdown-label { color: var(--text-tertiary); font-size: 0.7rem; text-transform: uppercase; margin-top: 5px; }
        .nav { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; }
        .nav-btn { padding: 12px 24px; background: transparent; border: 1px solid var(--border); border-radius: 12px; color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .nav-btn:hover { background: var(--bg-card); color: var(--text-primary); }
        .nav-btn.active { background: var(--bg-card); border-color: var(--accent); color: var(--text-primary); }
        .search-bar { position: relative; margin-bottom: 20px; }
        .search-bar input { width: 100%; padding: 14px 20px 14px 48px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; color: var(--text-primary); font-size: 1rem; outline: none; }
        .search-bar input:focus { border-color: var(--accent); }
        .search-bar svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--text-tertiary); }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .filter-chip { padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; color: var(--text-secondary); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .filter-chip:hover { border-color: var(--border-hover); }
        .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .clickable-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s; position: relative; }
        .clickable-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .card-badge.group { background: var(--accent-glow); color: #60a5fa; }
        .card-badge.knockout { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .card-badge.final { background: rgba(251,191,36,0.2); color: #fde047; }
        .card-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; }
        .card-subtitle { color: var(--text-secondary); font-size: 0.9rem; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal-overlay.active { display: block; }
        .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; max-width: 800px; margin: 50px auto; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .modal-title { font-size: 1.5rem; font-weight: 700; }
        .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 2rem; cursor: pointer; line-height: 1; }
        .modal-matches { display: flex; flex-direction: column; gap: 12px; }
        .modal-match { background: var(--bg-primary); border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .modal-match-team { font-weight: 600; }
        .modal-match-vs { color: var(--text-tertiary); }
        .modal-match-info { text-align: right; color: var(--text-secondary); font-size: 0.85rem; }
        .modal-teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .modal-team { background: var(--bg-primary); border-radius: 12px; padding: 16px; }
        .modal-team-name { font-weight: 600; margin-bottom: 8px; }
        .modal-team-matches { font-size: 0.85rem; color: var(--text-secondary); }
        @media (max-width: 768px) { .hero { grid-template-columns: repeat(2, 1fr); } .countdown-item { padding: 12px 15px; min-width: 60px; } .countdown-value { font-size: 1.8rem; } }
    </style>
</head>

            document.getElementById('modal-content').innerHTML = `
                <div class="modal-matches">
                    ${filtered.map(m => `
                        <div class="modal-match">
                            <div class="modal-match-teams">
                                <span class="modal-match-team">${m.team1}</span>
                                <span class="modal-match-vs">vs</span>
                                <span class="modal-match-team">${m.team2}</span>
                            </div>
                            <div class="modal-match-info">${m.date}<br>${m.time}<br>${m.venue}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }
        function showTeamDetails(teamName) {
            const team = teams.find(t => t.name === teamName);
            document.getElementById('modal-title').textContent = `${team.flag} ${team.name}`;
            document.getElementById('modal-content').innerHTML = `
                <div style="margin-bottom:15px;"><span class="card-badge group">Group ${team.group}</span></div>
                <div class="modal-matches">
                    ${team.matches.map(m => `<div class="modal-match"><span>${m}</span></div>`).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }
        function showGroupDetails(letter) {
            const group = groups.find(g => g.letter === letter);
            document.getElementById('modal-title').textContent = `Group ${letter}`;
            document.getElementById('modal-content').innerHTML = `
                <div class="modal-teams-grid">
                    ${group.teams.map(t => {
                        const team = teams.find(x => x.name === t);
                        return team ? `<div class="modal-team"><div class="modal-team-name">${team.flag} ${t}</div><div class="modal-team-matches">3 matches</div></div>` : `<div class="modal-team"><div class="modal-team-name">${t}</div><div class="modal-team-matches">TBD</div></div>`;
                    }).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }
        function showVenueDetails(venueName) {
            const venue = venues.find(v => v.name === venueName);
            const venueMatches = matches.filter(m => m.venue === venueName);
            document.getElementById('modal-title').textContent = venue.name;
            document.getElementById('modal-content').innerHTML = `
                <div style="margin-bottom:15px;color:var(--text-secondary)">${venue.city} ${venue.country}</div>
                <div class="modal-matches">
                    ${venueMatches.map(m => `
                        <div class="modal-match">
                            <div class="modal-match-teams">
                                <span class="modal-match-team">${m.team1}</span>
                                <span class="modal-match-vs">vs</span>
                                <span class="modal-match-team">${m.team2}</span>
                            </div>
                            <div class="modal-match-info">${m.date}<br>${m.time}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        document.getElementById('modal').addEventListener('click', (e) => { if(e.target.id === 'modal') closeModal(); });
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.section).classList.add('active');
                document.getElementById('matchFilters').style.display = btn.dataset.section === 'matches' ? 'flex' : 'none';
            });
        });
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.class                .remove('active'));
                currentFilter = chip.dataset.filter;
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.add('active'));
                renderMatches();
            });
        });
        
        function filter() { renderMatches(); renderTeams(); renderGroups(); renderVenues(); }
        
        function updateCountdown() {
            const start = new Date('2026-06-11T12:00:00-05:00');
            const now = new Date();
            const diff = start - now;
            if (diff > 0) {
                document.getElementById('days').textContent = Math.floor(diff / (1000*60*60*24));
                document.getElementById('hours').textContent = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                document.getElementById('minutes').textContent = Math.floor((diff % (1000*60*60)) / (1000*60));
                document.getElementById('seconds').textContent = Math.floor((diff % (1000*60)) / 1000);
                document.getElementById('countdown-days').textContent = Math.floor(diff / (1000*60*60*24));
            }
        }
        
        renderMatches(); renderTeams(); renderGroups(); renderVenues();
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
