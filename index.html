<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 FIFA World Cup 2026 | Interactive Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f;
            --bg-secondary: #12121a;
            --card: #1a1a24;
            --card-hover: #24242e;
            --border: #2a2a38;
            --text: #ffffff;
            --text-muted: #8b8b9e;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --group-a: #ef4444;
            --group-b: #f59e0b;
            --group-c: #22c55e;
            --group-d: #3b82f6;
            --group-e: #a855f7;
            --group-f: #ec4899;
            --group-g: #14b8a6;
            --group-h: #f97316;
            --knockout: #ef4444;
            --final: #fbbf24;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            padding: 60px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
        }
        .hero-content { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }
        .trophy { font-size: 4rem; margin-bottom: 10px; }
        .hero h1 { font-size: 3.5rem; font-weight: 900; background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .hero-subtitle { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 30px; }
        
        /* Stats Grid */
        .stats { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 40px; }
        .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 30px; min-width: 120px; }
        .stat-box.featured { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; }
        .stat-num { font-size: 2.5rem; font-weight: 800; }
        .stat-box.featured .stat-num { color: white; }
        .stat-label { color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; }
        .stat-box.featured .stat-label { color: rgba(255,255,255,0.8); }
        
        /* Countdown */
        .countdown { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .countdown-item { background: var(--bg-secondary); border-radius: 12px; padding: 20px 25px; min-width: 90px; }
        .countdown-num { font-size: 2.5rem; font-weight: 800; font-family: 'Inter', sans-serif; color: var(--accent); }
        .countdown-label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        
        /* Navigation */
        .nav { display: flex; gap: 10px; justify-content: center; padding: 30px 20px; flex-wrap: wrap; }
        .nav-btn { padding: 14px 28px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text-muted); font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .nav-btn:hover { background: var(--card-hover); color: var(--text); }
        .nav-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        
        /* Search */
        .search { max-width: 600px; margin: 0 auto 30px; padding: 0 20px; }
        .search input { width: 100%; padding: 16px 24px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; color: var(--text); font-size: 1rem; outline: none; }
        .search input:focus { border-color: var(--accent); }
        
        /* Main Content */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px 60px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .section-header { font-size: 1.8rem; font-weight: 700; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        
        /* Cards Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        .card-badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; }
        .card-badge.group { background: rgba(99,102,241,0.2); color: #818cf8; }
        .card-badge.knockout { background: rgba(239,68,68,0.2); color: #f87171; }
        .card-badge.final { background: rgba(251,191,36,0.2); color: #fbbf24; }
        
        .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
        .card-subtitle { color: var(--text-muted); font-size: 0.95rem; }
        .card-date { color: var(--text-muted); font-size: 0.85rem; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .modal.open { display: block; }
        .modal-content { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 24px; max-width: 700px; margin: 50px auto; padding: 40px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .modal-title { font-size: 1.8rem; font-weight: 800; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 2.5rem; cursor: pointer; line-height: 1; }
        
        .modal-list { display: flex; flex-direction: column; gap: 12px; }
        .modal-item { background: var(--card); border-radius: 12px; padding: 18px; display: flex; justify-content: space-between; align-items: center; }
        .modal-teams { display: flex; align-items: center; gap: 15px; flex: 1; }
        .modal-team { font-weight: 600; }
        .modal-vs { color: var(--text-muted); font-size: 0.9rem; }
        .modal-info { text-align: right; color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; }
        
        .modal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .modal-grid-item { background: var(--card); border-radius: 12px; padding: 16px; }
        .modal-grid-name { font-weight: 600; margin-bottom: 5px; }
        .modal-grid-info { color: var(--text-muted); font-size: 0.85rem; }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .stats { gap: 10px; }
            .stat-box { min-width: 100px; padding: 15px 20px; }
            .nav { gap: 8px; }
            .nav-btn { padding: 12px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <div class="trophy">🏆</div>
            <h1>FIFA World Cup 2026</h1>
            <p class="hero-subtitle">June 11 - July 19 | USA • Canada • Mexico</p>
            
            <div class="stats">
                <div class="stat-box featured"><div class="stat-num" id="days-left">--</div><div class="stat-label">Days Until Kickoff</div></div>
                <div class="stat-box"><div class="stat-num">48</div><div class="stat-label">Group Matches</div></div>
                <div class="stat-box"><div class="stat-num">32</div><div class="stat-label">Knockout</div></div>
                <div class="stat-box"><div class="stat-num">16</div><div class="stat-label">Stadiums</div></div>
                <div class="stat-box"><div class="stat-num">48</div><div class="stat-label">Teams</div></div>
            </div>
            
            <div class="countdown">
                <div class="countdown-item"><div class="countdown-num" id="days">--</div><div class="countdown-label">Days</div></div>
                <div class="countdown-item"><div class="countdown-num" id="hours">--</div><div class="countdown-label">Hours</div></div>
                <div class="countdown-item"><div class="countdown-num" id="mins">--</div><div class="countdown-label">Mins</div></div>
                <div class="countdown-item"><div class="countdown-num" id="secs">--</div><div class="countdown-label">Secs</div></div>
            </div>
        </div>
    </div>
    
    <nav class="nav">
        <button class="nav-btn active" data-tab="matches">📅 Matches</button>
        <button class="nav-btn" data-tab="teams">👥 Teams</button>
        <button class="nav-btn" data-tab="groups">🔢 Groups</button>
        <button class="nav-btn" data-tab="venues">📍 Venues</button>
    </nav>
    
    <div class="search">
        <input type="text" id="search" placeholder="🔍 Search matches, teams, venues..." oninput="filter()">
    </div>
    
    <div class="container">
        <!-- MATCHES -->
        <section id="matches" class="section active">
            <h2 class="section-header">📅 All Matches</h2>
            <div class="grid" id="matches-grid"></div>
        </section>
        
        <!-- TEAMS -->
        <section id="teams" class="section">
            <h2 class="section-header">👥 All Teams</h2>
            <div class="grid" id="teams-grid"></div>
        </section>
        
        <!-- GROUPS -->
        <section id="groups" class="section">
            <h2 class="section-header">🔢 Tournament Groups</h2>
            <div class="grid" id="groups-grid"></div>
        </section>
        
        <!-- VENUES -->
        <section id="venues" class="section">
            <h2 class="section-header">📍 All Venues</h2>
            <div class="grid" id="venues-grid"></div>
        </section>
    </div>
    
    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modal-title"></div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>
    
    <script>

            { date: 'June 28', time: '2:00 PM CT', t1: 'TBD', t2: 'TBD', venue: 'SoFi Stadium', stage: 'knockout' },

            { date: 'July 19', time: '2:00 PM CT', t1: '🏆 FINAL', t2: 'Champion', venue: 'MetLife Stadium', stage: 'final' }

        const teams = [

            { name: 'Canada', flag: '🇨🇦', group: 'B', matches: ['Jun 12: vs Playoff A', 'Jun 18: vs Qatar', 'Jun 24: vs Switzerland'] },
            { name: 'Croatia', flag: '🇭🇷', group: 'L', matches: ['Jun 17: vs England', 'Jun 23: vs Panama', 'Jun 27: vs Ghana'] },
            { name: 'England', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', group: 'L', matches: ['Jun 17: vs Croatia', 'Jun 23: vs Ghana', 'Jun 27: vs Panama'] },
            { name: 'France', flag: '🇫🇷', group: 'I', matches: ['Jun 16: vs Senegal', 'Jun 22: vs Playoff 2', 'Jun 26: vs Norway'] },
            { name: 'Germany', flag: '🇩🇪', group: 'E', matches: ['Jun 14: vs Curacao', 'Jun 20: vs Ivory Coast', 'Jun 25: vs Ecuador'] },

            { name: 'Morocco', flag: '🇲🇦', group: 'C', matches: ['Jun 13: vs Brazil', 'Jun 18: vs Scotland', 'Jun 24: vs Haiti'] },

            { name: 'Spain', flag: '🇪🇸', group: 'H', matches: ['Jun 15: vs Cape Verde', 'Jun 21: vs Saudi Arabia', 'Jun 26: vs Uruguay'] },
            { name: 'USA', flag: '🇺🇸', group: 'D', matches: ['Jun 12: vs Paraguay', 'Jun 19: vs Australia', 'Jun 25: vs Playoff C'] },
            { name: 'Uruguay', flag: '🇺🇾', group: 'H', matches: ['Jun 15: vs Saudi Arabia', 'Jun 21: vs Cape Verde', 'Jun 26: vs Spain'] }
        ];
        
        const groups = [
            { letter: 'A', teams: ['Mexico', 'South Korea', 'South Africa', 'Playoff D'] },
            { letter: 'B', teams: ['Canada', 'Qatar', 'Switzerland', 'Playoff A'] },
            { letter: 'C', teams: ['Brazil', 'Haiti', 'Morocco', 'Scotland'] },

        // RENDER
        function render() {
            const s = document.getElementById('search').value.toLowerCase();
            
            // Matches
            document.getElementById('matches-grid').innerHTML = matches.filter(m => 
                `${m.date} ${m.t1} ${m.t2} ${m.venue}`.toLowerCase().includes(s)
            ).map(m => `
                <div class="card" onclick="showMatch('${m.stage}', '${m.group || m.stage}')">
                    <span class="card-badge ${m.stage}">${m.group ? 'Group ' + m.group : m.stage}</span>
                    <div class="card-title">${m.t1} vs ${m.t2}</div>
                    <div class="card-subtitle">📍 ${m.venue}</div>
                    <div class="card-date">${m.date} • ${m.time}</div>
                </div>
            `).join('');
            
            // Teams
            document.getElementById('teams-grid').innerHTML = teams.filter(t => 
                `${t.name} Group ${t.group}`.toLowerCase().includes(s)
            ).map(t => `
                <div class="card" onclick="showTeam('${t.name}')">
                    <span class="card-badge group">Group ${t.group}</span>
                    <div class="card-title">${t.flag} ${t.name}</div>
                    <div class="card-subtitle">${t.matches.length} matches</div>
                </div>
            `).join('');
            
            // Groups
            document.getElementById('groups-grid').innerHTML = groups.filter(g => 
                `${g.letter} ${g.teams.join(' ')}`.toLowerCase().includes(s)
            ).map(g => `
                <div class="card" onclick="showGroup('${g.letter}')">
                    <span class="card-badge group">Group</span>
                    <div class="card-title">Group ${g.letter}</div>
                    <div class="card-subtitle">${g.teams.length} teams</div>
                </div>
            `).join('');
            
            // Venues
            document.getElementById('venues-grid').innerHTML = venues.filter(v => 
                `${v.name} ${v.city}`.toLowerCase().includes(s)
            ).map(v => `
                <div class="card" onclick="showVenue('${v.name}')">
                    <span class="card-badge group">${v.matches.length} matches</span>
                    <div class="card-title">${v.name}</div>
                    <div class="card-subtitle">${v.city}, ${v.country}</div>
                </div>
            `).join('');
        }
        
        // MODAL
        function showMatch(stage, filter) {
            const list = stage === 'group' ? matches.filter(m => m.group === filter) : 
                        stage === 'knockout' ? matches.filter(m => m.stage === 'knockout') :
                        stage === 'final' ? matches.filter(m => m.stage === 'final') : matches;
            const title = stage === 'group' ? `Group ${filter} Matches` : 
                         stage === 'knockout' ? 'Knockout Matches' : 'Final';
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = `
                <div class="modal-list">
                    ${list.map(m => `
                        <div class="modal-item">
                            <div class="modal-teams">
                                <span class="modal-team">${m.t1}</span>
                                <span class="modal-vs">vs</span>
                                <span class="modal-team">${m.t2}</span>
                            </div>
                            <div class="modal-info">${m.date}<br>${m.time}<br>${m.venue}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('open');
        }
        
        function showTeam(teamName) {
            const t = teams.find(x => x.name === teamName);
            document.getElementById('modal-title').textContent = `${t.flag} ${t.name}`;
            document.getElementById('modal-body').innerHTML = `
                <div style="margin-bottom:20px;"><span class="card-badge group">Group ${t.group}</span></div>
                <div class="modal-list">
                    ${t.matches.map(m => `<div class="modal-item"><span>${m}</span></div>`).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('open');
        }
        
        function showGroup(letter) {
            const g = groups.find(x => x.letter === letter);
            document.getElementById('modal-title').textContent = `Group ${letter}`;
            document.getElementById('modal-body').innerHTML = `
                <div class="modal-grid">
                    ${g.teams.map(t => `
                        <div class="modal-grid-item">
                            <div class="modal-grid-name">${t}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('open');
        }
        
        function showVenue(venueName) {
            const v = venues.find(x => x.name === venueName);
            document.getElementById('modal-title').textContent = v.name;
            document.getElementById('modal-body').innerHTML = `
                <div style="margin-bottom:20px;color:var(--text-muted)">${v.city}, ${v.country}</div>
                <div class="modal-list">
                    ${v.matches.map(m => `<div class="modal-item"><span>${m}</span></div>`).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('open');
        }
        
        function closeModal() { document.getElementById('modal').classList.remove('open'); }
        document.getElementById('modal').addEventListener('click', e => { if(e.target.id === 'modal') closeModal(); });
        
        // TABS
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });
        
        function filter() { render(); }
        
        // COUNTDOWN
        function updateCountdown() {
            const start = new Date('2026-06-11T12:00:00-05:00');
            const now = new Date();
            const diff = start - now;
            if (diff > 0) {
                document.getElementById('days').textContent = Math.floor(diff/(1000*60*60*24));
                document.getElementById('hours').textContent = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
                document.getElementById('mins').textContent = Math.floor((diff%(1000*60*60))/(1000*60));
                document.getElementById('secs').textContent = Math.floor((diff%(1000*60))/1000);
                document.getElementById('days-left').textContent = Math.floor(diff/(1000*60*60*24));
            }
        }
        
        render();
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
