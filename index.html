<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 | Live Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-card: #1a1a1a;
            --bg-card-hover: #222222;
            --border: #2a2a2a;
            --border-hover: #3a3a3a;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a1;
            --text-tertiary: #6b6b6b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; line-height: 1.6; }
        .app { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 48px; height: 48px; background: var(--gradient); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; }
        .logo-text { font-size: 1.5rem; font-weight: 700; }
        .logo-text span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; text-decoration: none; }
        .btn-primary { background: var(--gradient); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4); }
        .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); }
        
        .hero { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 40px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; text-align: center; transition: all 0.3s; }
        .stat-card:hover { border-color: var(--border-hover); transform: translateY(-4px); }
        .stat-card.featured { background: var(--gradient); border: none; }
        .stat-card.featured .stat-value, .stat-card.featured .stat-label { color: white; }
        .stat-value { font-size: 2.5rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px; }
        
        .countdown-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 40px; text-align: center; margin-bottom: 40px; }
        .countdown-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gradient); }
        .countdown-title { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .countdown { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .countdown-item { background: #111; border-radius: var(--radius-md); padding: 20px 30px; min-width: 100px; }
        .countdown-value { font-size: 3rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; line-height: 1; }
        .countdown-label { color: var(--text-tertiary); font-size: 0.75rem; text-transform: uppercase; margin-top: 8px; }
        
        .nav { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; }
        .nav-btn { padding: 12px 24px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .nav-btn:hover { background: var(--bg-card); color: var(--text-primary); }
        .nav-btn.active { background: var(--bg-card); border-color: var(--accent); color: var(--text-primary); }
        
        .search-bar { position: relative; margin-bottom: 24px; }
        .search-bar input { width: 100%; padding: 16px 20px 16px 48px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); color: var(--text-primary); font-size: 1rem; outline: none; }
        .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .search-bar svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--text-tertiary); }
        
        .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-bottom: 40px; }
        .match-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; transition: all 0.3s; cursor: pointer; position: relative; }
        .match-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; opacity: 0; transition: opacity 0.3s; }
        .match-card:hover { border-color: var(--border-hover); transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .match-card:hover::before { opacity: 1; }
        .match-card.group-a::before { background: linear-gradient(90deg, #ef4444, #f87171); }
        .match-card.group-b::before { background: linear-gradient(90deg, #eab308, #facc15); }
        .match-card.group-c::before { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .match-card.group-d::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .match-card.group-e::before { background: linear-gradient(90deg, #a855f7, #c084fc); }
        .match-card.group-f::before { background: linear-gradient(90deg, #ec4899, #f472b6); }
        .match-card.group-g::before { background: linear-gradient(90deg, #14b8a6, #2dd4bf); }
        .match-card.group-h::before { background: linear-gradient(90deg, #f97316, #fb923c); }
        .match-card.knockout::before { background: linear-gradient(90deg, #ef4444, #f87171); }
        .match-card.final::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .match-date-badge { font-size: 0.75rem; color: var(--text-tertiary); text-transform: uppercase; }
        .match-stage-badge { font-size: 0.7rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
        .match-stage-badge.group { background: var(--accent-glow); color: #60a5fa; }
        .match-stage-badge.knockout { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        .match-stage-badge.final { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .match-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 16px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .match-team { flex: 1; text-align: center; }
        .match-team-name { font-weight: 600; font-size: 1rem; }
        .match-vs { color: var(--text-tertiary); font-size: 0.85rem; padding: 0 16px; }
        .match-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--text-secondary); }
        .match-time { font-weight: 500; color: var(--accent); }
        
        .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 40px; }
        .team-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; transition: all 0.3s; }
        .team-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        .team-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .team-flag { width: 40px; height: 30px; background: #111; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .team-name { font-weight: 600; font-size: 1rem; }
        .team-group { font-size: 0.8rem; color: var(--text-tertiary); }
        .team-matches { display: flex; flex-direction: column; gap: 8px; }
        .team-match-item { font-size: 0.8rem; color: var(--text-secondary); padding: 8px; background: #111; border-radius: 8px; }
        
        .venues-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 40px; }
        .venue-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; transition: all 0.3s; }
        .venue-card:hover { border-color: var(--border-hover); }
        .venue-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .venue-name { font-weight: 600; font-size: 1.1rem; }
        .venue-city { color: var(--text-tertiary); font-size: 0.85rem; }
        .venue-match-count { background: var(--accent-glow); color: #60a5fa; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .venue-country { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); }
        
        .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .group-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
        .group-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .group-header.group-a { background: linear-gradient(90deg, #ef4444, #f87171); }
        .group-header.group-b { background: linear-gradient(90deg, #eab308, #facc15); }
        .group-header.group-c { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .group-header.group-d { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .group-header.group-e { background: linear-gradient(90deg, #a855f7, #c084fc); }
        .group-header.group-f { background: linear-gradient(90deg, #ec4899, #f472b6); }
        .group-header.group-g { background: linear-gradient(90deg, #14b8a6, #2dd4bf); }
        .group-header.group-h { background: linear-gradient(90deg, #f97316, #fb923c); }
        .group-letter { font-size: 1.5rem; font-weight: 800; color: white; }
        .group-teams { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
        .group-team { font-size: 0.9rem; color: var(--text-secondary); padding: 8px 12px; background: #111; border-radius: 8px; }
        
        .footer { text-align: center; padding: 40px 20px; border-top: 1px solid var(--border); color: var(--text-tertiary); font-size: 0.85rem; }
        .section { display: none; }
        .section.active { display: block; }
        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; }
        
        @media (max-width: 768px) { .hero { grid-template-columns: repeat(2, 1fr); } .countdown-item { padding: 16px; min-width: 70px; } .countdown-value { font-size: 2rem; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .match-card { animation: fadeIn 0.3s ease-out; }
    </style>
</head>

            { name: 'Miami Stadium', city: 'Miami', country: '🇺🇸 USA', matches: 6 },
            { name: 'BC Place', city: 'Vancouver', country: '🇨🇦 Canada', matches: 6 },
            { name: 'Toronto Stadium', city: 'Toronto', country: '🇨🇦 Canada', matches: 5 },
            { name: 'Arrowhead Stadium', city: 'Kansas City', country: '🇺🇸 USA', matches: 5 },
            { name: 'Philadelphia Stadium', city: 'Philadelphia', country: '🇺🇸 USA', matches: 5 },
            { name: 'Estadio Akron', city: 'Guadalajara', country: '🇲🇽 Mexico', matches: 5 },
            { name: 'Estadio BBVA', city: 'Monterrey', country: '🇲🇽 Mexico', matches: 4 }
        ];
        
        function renderMatches() {
            const grid = document.getElementById('matches-grid');
            const search = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = matches.filter(m => {
                return `${m.date} ${m.team1} ${m.team2} ${m.venue}`.toLowerCase().includes(search);
            }).map(m => `
                <div class="match-card ${m.group ? 'group-' + m.group.toLowerCase() : m.stage}">
                    <div class="match-header">
                        <span class="match-date-badge">${m.date}</span>
                        <span class="match-stage-badge ${m.stage}">${m.group ? 'Group ' + m.group : m.stage}</span>
                    </div>
                    <div class="match-teams">
                        <div class="match-team"><div class="match-team-name">${m.team1}</div></div>
                        <div class="match-vs">vs</div>
                        <div class="match-team"><div class="match-team-name">${m.team2}</div></div>
                    </div>
                    <div class="match-footer">
                        <span class="match-venue">📍 ${m.venue}</span>
                        <span class="match-time">${m.time}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderTeams() {
            const grid = document.getElementById('teams-grid');
            const search = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = teams.filter(t => {
                return `${t.name} ${t.group}`.toLowerCase().includes(search);
            }).map(t => `
                <div class="team-card">
                    <div class="team-header">
                        <div class="team-flag">${t.flag}</div>
                        <div><div class="team-name">${t.name}</div><div class="team-group">Group ${t.group}</div></div>
                    </div>
                    <div class="team-matches">${t.matches.map(m => `<div class="team-match-item">${m}</div>`).join('')}</div>
                </div>
            `).join('');
        }
        
        function renderGroups() {
            const grid = document.getElementById('groups-grid');
            const search = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = groups.filter(g => {
                return `${g.letter} ${g.teams.join(' ')}`.toLowerCase().includes(search);
            }).map(g => `
                <div class="group-card">
                    <div class="group-header group-${g.letter.toLowerCase()}">
                        <span class="group-letter">Group ${g.letter}</span>
                    </div>
                    <div class="group-teams">${g.teams.map(t => `<div class="group-team">${t}</div>`).join('')}</div>
                </div>
            `).join('');
        }
        
        function renderVenues() {
            const grid = document.getElementById('venues-grid');
            const search = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = venues.filter(v => {
                return `${v.name} ${v.city} ${v.country}`.toLowerCase().includes(search);
            }).map(v => `
                <div class="venue-card">
                    <div class="venue-header">
                        <div><div class="venue-name">${v.name}</div><div class="venue-city">${v.city}</div></div>
                        <span class="venue-match-count">${v.matches} matches</span>
                    </div>
                    <div class="venue-country">${v.country}</div>
                </div>
            `            `).join('');
        }
        
        // Navigation
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.section).classList.add('active');
            });
        });
        
        // Countdown
        function updateCountdown() {
            const start = new Date('2026-06-11T12:00:00-05:00');
            const now = new Date();
            const diff = start - now;
            if (diff > 0) {
                document.getElementById('days').textContent = Math.floor(diff / (1000*60*60*24));
                document.getElementById('hours').textContent = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                document.getElementById('minutes').textContent = Math.floor((diff % (1000*60*60)) / (1000*60));
                document.getElementById('seconds').textContent = Math.floor((diff % (1000*60)) / 1000);
                document.getElementById('countdown-days').textContent = Math.floor(diff / (1000*60*60*24));
            }
        }
        
        function filterContent() {
            renderMatches();
            renderTeams();
            renderGroups();
            renderVenues();
        }
        
        // Init
        renderMatches();
        renderTeams();
        renderGroups();
        renderVenues();
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
