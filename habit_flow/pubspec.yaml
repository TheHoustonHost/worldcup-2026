name: habit_flow
description: AI-powered habit tracker with streaks and personalized coaching
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.1
  http: ^1.2.0
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
